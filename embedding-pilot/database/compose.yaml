services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai-riviera-embedding-pilot-db
    environment:
      POSTGRES_DB: ai_riviera_embedding_pilot
      POSTGRES_USER: pilot
      POSTGRES_PASSWORD: pilot_local_only
    ports:
      - "127.0.0.1:55432:5432"
    volumes:
      - ai_riviera_embedding_pilot_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pilot -d ai_riviera_embedding_pilot"]
      interval: 3s
      timeout: 3s
      retries: 20
    restart: unless-stopped

volumes:
  ai_riviera_embedding_pilot_data:
    name: ai_riviera_embedding_pilot_data
